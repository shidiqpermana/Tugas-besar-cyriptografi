<!doctype html>
<html lang="id" data-bs-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Aplikasi Cipher{% endblock %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="/">Cipher Lab</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNavbar">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item"><a class="nav-link" href="/caesar">Caesar</a></li>
            <li class="nav-item"><a class="nav-link" href="/vigenere">Vigenere</a></li>
            <li class="nav-item"><a class="nav-link" href="/playfair">Playfair</a></li>
            <li class="nav-item"><a class="nav-link" href="/railfence">Rail Fence</a></li>
            <li class="nav-item"><a class="nav-link" href="/transposition">Transposition</a></li>
          </ul>
          <button id="theme-toggle" class="btn btn-outline-secondary btn-sm" type="button">Dark Mode</button>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      {% block content %}{% endblock %}
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script>
      const htmlElement = document.documentElement;
      const toggleButton = document.getElementById("theme-toggle");
      const savedTheme = localStorage.getItem("theme") || "light";
      htmlElement.setAttribute("data-bs-theme", savedTheme);
      toggleButton.textContent = savedTheme === "light" ? "Dark Mode" : "Light Mode";

      toggleButton.addEventListener("click", () => {
        const currentTheme = htmlElement.getAttribute("data-bs-theme");
        const nextTheme = currentTheme === "light" ? "dark" : "light";
        htmlElement.setAttribute("data-bs-theme", nextTheme);
        localStorage.setItem("theme", nextTheme);
        toggleButton.textContent = nextTheme === "light" ? "Dark Mode" : "Light Mode";
      });
    </script>
  </body>
</html>
